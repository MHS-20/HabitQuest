name: Build and Package Multiplatform UI

on:
  push:
    paths:
      - 'habitquest-ui/**'
      - '.github/workflows/build_ui.yml'
  pull_request:
    paths:
      - 'habitquest-ui/**'
      - '.github/workflows/build_ui.yml'

jobs:
  commit-lint:
    name: Run Commit Lint
    runs-on: ubuntu-22.04
    if: github.actor != 'dependabot[bot]'
    steps:
      - run: echo "Actor is ${{ github.actor }}"
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: commitlint.config.js

  static-scan:
    name: Static Vulnerability Scan
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Update Grype DB
        run: |
          for i in 1 2 3; do
            curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
              | sh -s -- -b /usr/local/bin && break
            sleep 5
          done
          grype db update
      - name: Code vulnerability scanning
        id: run_scan
        run: |
          grype \
             dir:${{ github.workspace }} \
             --output sarif > report.sarif

      - name: Upload vulnerability report
        uses: github/codeql-action/upload-sarif@v4
        if: steps.run_scan.outcome == 'success'
        with:
          sarif_file: report.sarif

  build:
    name: Build and Test (Kotlin Multiplatform)
    runs-on: ubuntu-22.04
    needs: [ commit-lint, static-scan ]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Node (for Kotlin/JS)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Gradle and Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-build-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/build.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-build-

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: node-${{ runner.os }}-modules-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-modules-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run Gradle build (KMP targets)
        # Exclude Android release assemble to avoid requiring Android SDK on Linux runners
        run: |
          ./gradlew --no-daemon clean :habitquest-ui:build -x :habitquest-ui:composeApp:assembleRelease

      - name: Build Kotlin/JS production bundle
        run: |
          ./gradlew --no-daemon :habitquest-ui:composeApp:jsBrowserProductionWebpack || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            habitquest-ui/build/**
            habitquest-ui/composeApp/build/**

  lint-reports:
    name: Upload Lint & Reports (if any)
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build_outputs/

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            habitquest-ui/build/reports/**
            habitquest-ui/composeApp/build/reports/**
