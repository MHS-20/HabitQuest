name: Build and Package Multiplatform UI

on:
  push:
    paths:
      - 'habitquest-ui/**'
      - '.github/workflows/build_ui.yml'
  pull_request:
    paths:
      - 'habitquest-ui/**'
      - '.github/workflows/build_ui.yml'

jobs:
  commit-lint:
    name: Run Commit Lint
    runs-on: ubuntu-22.04
    if: github.actor != 'dependabot[bot]'
    steps:
      - run: echo "Actor is ${{ github.actor }}"
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: commitlint.config.js

  static-scan:
    name: Static Vulnerability Scan
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Update Grype DB
        run: |
          for i in 1 2 3; do
            curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
              | sh -s -- -b /usr/local/bin && break
            sleep 5
          done
          grype db update
      - name: Code vulnerability scanning
        id: run_scan
        run: |
          grype \
             dir:${{ github.workspace }} \
             --output sarif > report.sarif

      - name: Upload vulnerability report
        uses: github/codeql-action/upload-sarif@v4
        if: steps.run_scan.outcome == 'success'
        with:
          sarif_file: report.sarif

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    needs: [ commit-lint, static-scan ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: web
            runs-on: ubuntu-22.04
            artifact-name: build-artifacts-web
          - platform: android
            runs-on: ubuntu-22.04
            artifact-name: build-artifacts-android
          - platform: ios
            runs-on: macos-latest
            artifact-name: build-artifacts-ios

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Node (for Kotlin/JS)
        if: matrix.platform == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        if: matrix.platform == 'android'
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle and Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/build.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.platform }}-

      - name: Cache node modules
        if: matrix.platform == 'web'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: node-${{ runner.os }}-modules-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-modules-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build web bundle
        if: matrix.platform == 'web'
        run: |
          ./gradlew --no-daemon :kotlinUpgradeYarnLock
          ./gradlew --no-daemon :habitquest-ui:composeApp:jsBrowserProductionWebpack

      - name: Build Android app
        if: matrix.platform == 'android'
        run: |
          ./gradlew --no-daemon :habitquest-ui:composeApp:assembleDebug

      - name: Build iOS app
        if: matrix.platform == 'ios'
        run: |
          ./gradlew --no-daemon :habitquest-ui:composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Upload web build artifacts
        if: matrix.platform == 'web'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            habitquest-ui/build/**
            habitquest-ui/composeApp/build/**

      - name: Upload Android build artifacts
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            habitquest-ui/composeApp/build/outputs/**
            habitquest-ui/composeApp/build/reports/**

      - name: Upload iOS build artifacts
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            habitquest-ui/composeApp/build/bin/iosSimulatorArm64/**
