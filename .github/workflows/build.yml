name: Build and Package

on:
  push:
  pull_request:

env:
  REGISTRY: ghcr.io
  VERSION: ${{ github.sha }}

jobs:

  commit-lint:
    name: Run Commit Lint
    runs-on: ubuntu-22.04
    if: github.actor != 'dependabot[bot]'
    steps:
      - run: echo "Actor is ${{ github.actor }}"
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: commitlint.config.js

  k8s-validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: alexellis/setup-arkade@v3
      - uses: alexellis/arkade-get@master
        with:
          kustomize: latest
          kubeconform: latest
      - run: |
          kustomize build k8s | kubeconform --strict -

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-22.04
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            notification-service:
              - 'services/notification-service/**'
            tracking-service:
              - 'services/tracking-service/**'
            marketplace-service:
              - 'services/marketplace-service/**'
            guild-service:
              - 'services/guild-service/**'
            edge-service:
              - 'services/edge-service/**'
            quest-service:
              - 'services/quest-service/**'
            avatar-service:
              - 'services/avatar-service/**'

  build:
    name: Build & Test Changed Services
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build service
        run: |
          chmod +x gradlew
          ./gradlew :services:${{ matrix.service }}:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: services/${{ matrix.service }}/build/libs/*.jar

  build-aggregate:
    name: Build Aggregate Status
    runs-on: ubuntu-22.04
    needs: [ detect-changes, build ]
    if: always()
    steps:
      - name: Fail if build failed
        run: |
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "One or more builds failed"
            exit 1
          fi

  package-scan-publish:
    name: Package, Scan & Publish
    needs:
      - build-aggregate
      - detect-changes
    if: ${{ success() && needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
      packages: write
      security-events: write

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: services/${{ matrix.service }}/build/libs/

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --file services/${{ matrix.service }}/Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.VERSION }} \
            services/${{ matrix.service }}

      - name: Update Grype DB
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype db update

      - name: Scan Docker image
        run: |
          grype \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.VERSION }} \
            --output sarif \
            --file results.sarif \
            --fail-on high || true 

      - name: Upload vulnerability report
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles(steps.scan.outputs.sarif) != ''
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

      - name: Push image (SHA tag)
        run: |
          docker push \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.VERSION }}

      - name: Push image (latest)
        run: |
          docker tag \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest

          docker push \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest

      - name: Trigger Semantic Release
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: microservice_semantic_release
          client-payload: |
            {
              "service": "${{ matrix.service }}",
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}"
            }

  package-aggregate:
    name: Package Aggregate Status
    runs-on: ubuntu-22.04
    needs:
      - detect-changes
      - package-scan-publish
    if: always()
    steps:
      - name: Evaluate package results
        run: |
          if [[ "${{ needs.package-scan-publish.result }}" == "failure" ]]; then
            echo "One or more package jobs failed"
            exit 1
          fi