name: Semantic Release

on:
  repository_dispatch:
    types: [microservice_semantic_release]

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write
  actions: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semantic.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract service name
        id: vars
        run: |
          echo "SERVICE=${{ github.event.client_payload.service }}" >> $GITHUB_ENV
          echo "IMAGE=${{ github.event.client_payload.image }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g --save-dev semantic-release \
            @semantic-release/git \
            @semantic-release/changelog \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            semantic-release-monorepo

      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVICE: ${{ env.SERVICE }}
        run: |
          cd services/$SERVICE
          npx semantic-release-monorepo --tag-format "${SERVICE}-v\${version}" 2>&1 | tee release_output.log
          if grep -q "Created tag" release_output.log; then
            VERSION=$(grep -oP "${SERVICE}-v\K[0-9]+\.[0-9]+\.[0-9]+" release_output.log | head -1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected Version: $VERSION"
          else
            echo "No release created"
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.semantic.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        if: steps.semantic.outputs.version != ''
        run: |
          docker pull $IMAGE:latest

      - name: Tag Docker image with semantic version
        if: steps.semantic.outputs.version != ''
        run: |
          VERSION=${{ steps.semantic.outputs.version }}
          docker tag $IMAGE:latest $IMAGE:$VERSION
          docker push $IMAGE:$VERSION

      - name: Trigger Update Manifest workflow
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: update_manifest
          client-payload: |
            {
              "app_image": "${{ env.REGISTRY }}/${{ env.IMAGE }}/${{ env.SERVICE }}",
              "app_name": "${{ env.SERVICE }}",
              "app_version": "${{ steps.semantic.outputs.version }}"
            }