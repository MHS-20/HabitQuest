name: Semantic Release

on:
  repository_dispatch:
    types: [microservice_semantic_release, ui_semantic_release]

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write
  actions: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semantic.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract service name
        id: vars
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          IMAGE="${{ github.event.client_payload.image }}"

          echo "SERVICE=$SERVICE" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "SERVICE_SHORT=${SERVICE%-service}" >> $GITHUB_ENV

          if [[ "$SERVICE" == "habitquest-ui" ]]; then
            echo "RELEASE_DIR=habitquest-ui" >> $GITHUB_ENV
          else
            echo "RELEASE_DIR=services/$SERVICE" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install semantic-release
        run: |
          cd "$RELEASE_DIR"
          npm install --save-dev semantic-release \
            @semantic-release/git \
            @semantic-release/changelog \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            semantic-release-monorepo \
            conventional-changelog-conventionalcommits

      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVICE: ${{ env.SERVICE }}
        run: |
          cd "$RELEASE_DIR"
          npx semantic-release 2>&1 | tee release_output.log
          if grep -q "Created tag" release_output.log; then
            VERSION=$(grep -oP "${SERVICE_SHORT}-v\K[0-9]+\.[0-9]+\.[0-9]+" release_output.log | head -1)
            # VERSION=$(sed -n "s/.*${SERVICE_SHORT}-v\([0-9.]*\).*/\1/p" release_output.log | head -1)
            # VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected Version: $VERSION"
          else
            echo "No release created"
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: env.IMAGE != '' && steps.semantic.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        if: env.IMAGE != '' && steps.semantic.outputs.version != ''
        run: |
          docker pull $IMAGE:latest

      - name: Tag Docker image with semantic version
        if: env.IMAGE != '' && steps.semantic.outputs.version != ''
        run: |
          VERSION=${{ steps.semantic.outputs.version }}
          docker tag $IMAGE:latest $IMAGE:$VERSION
          docker push $IMAGE:$VERSION

      - name: Trigger Update Manifest workflow
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: update_manifest
          client-payload: |
            {
              "app_image": "${{ env.REGISTRY }}/${{ env.IMAGE }}/${{ env.SERVICE }}",
              "app_name": "${{ env.SERVICE }}",
              "app_version": "${{ steps.semantic.outputs.version }}"
            }