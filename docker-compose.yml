name: habitquest

networks:
  default:
    name: habitquest-network
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"

  avatar-service:
    build:
      context: ./services/avatar-service
    depends_on:
      - kafka
      - marketplace-service
      - otel-collector
    environment:
      SERVER_PORT: 8081
      KAFKA_BROKER: kafka:9092
      MARKETPLACE_SERVICE_URI: http://marketplace-service:8083
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318
    ports:
      - "8081:8081"

  guild-service:
    build:
      context: ./services/guild-service
    depends_on:
      - kafka
      - otel-collector
    environment:
      SERVER_PORT: 8082
      KAFKA_BROKER: kafka:9092
      AVATAR_SERVICE_URI: http://avatar-service:8081
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318
    ports:
      - "8082:8082"

  marketplace-service:
    build:
      context: ./services/marketplace-service
    depends_on:
      - kafka
      - otel-collector
    environment:
      SERVER_PORT: 8083
      KAFKA_BROKER: kafka:9092
      AVATAR_SERVICE_URI: http://avatar-service:8081
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318
    ports:
      - "8083:8083"

  quest-service:
    build:
      context: ./services/quest-service
    depends_on:
      - kafka
      - otel-collector
    environment:
      SERVER_PORT: 8084
      KAFKA_BROKER: kafka:9092
      AVATAR_SERVICE_URI: http://avatar-service:8081
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318
    ports:
      - "8084:8084"

  tracking-service:
    build:
      context: ./services/tracking-service
    depends_on:
      - kafka
      - otel-collector
    environment:
      SERVER_PORT: 8085
      KAFKA_BROKER: kafka:9092
      AVATAR_SERVICE_URI: http://avatar-service:8081
      QUEST_SERVICE_URI: http://quest-service:8084
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318
    ports:
      - "8085:8085"

  notification-service:
    build:
      context: ./services/notification-service
    depends_on:
      - kafka
      - otel-collector
    environment:
      SERVER_PORT: 8086
      KAFKA_BROKER: kafka:9092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318
    ports:
      - "8086:8086"

  edge-service:
    build:
      context: ./services/edge-service
    depends_on:
      - kafka
      - otel-collector
      - avatar-service
      - guild-service
      - quest-service
      - tracking-service
      - marketplace-service
      - notification-service
    environment:
      SERVER_PORT: 9000
      KAFKA_BROKER: kafka:9092
      AVATAR_SERVICE_URI: http://avatar-service:8081
      GUILD_SERVICE_URI: http://guild-service:8082
      MARKETPLACE_SERVICE_URI: http://marketplace-service:8083
      QUEST_SERVICE_URI: http://quest-service:8084
      TRACKING_SERVICE_URI: http://tracking-service:8085
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318
    ports:
      - "9000:9000"