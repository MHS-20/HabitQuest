server:
  port: 8085
  shutdown: graceful
  tomcat:
    connection-timeout: 2s

info:
  system: HabitQuest
avatar:
  service-uri: ${AVATAR_SERVICE_URI:http://localhost:8081}
quest:
  service-uri: ${QUEST_SERVICE_URI:http://localhost:8084}

spring:
  application:
    name: tracking-service
  lifecycle:
    timeout-per-shutdown-phase: 15s

################## KAFKA ##################
  cloud:
    stream:
      bindings:
        habit-deleted-out-0:
          destination: habit.deleted
          content-type: application/json
        habit-attended-out-0:
          destination: habit.attended
          content-type: application/json
        habit-not-attended-out-0:
          destination: habit.not-attended
          content-type: application/json
      kafka:
        binder:
          brokers: ${KAFKA_BROKER:localhost:9092}
          auto-create-topics: true
          producer-properties:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer
            acks: all
            retries: 3
            enable.idempotence: true

################## RESILIENCY ##################
resilience4j:
  retry:
    default-config: default
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException

  circuit-breaker:
    default-config: default
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException


############ OBSERVABILITY #############
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, circuitbreakers, retries, bindings, configprops, env, functions, health, heapdump, info, loggers, mappings, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
  otlp:
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318}/v1/metrics
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318}/v1/traces

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        resilience4j.circuitbreaker: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}
  health:
    circuitbreakers:
      enabled: true