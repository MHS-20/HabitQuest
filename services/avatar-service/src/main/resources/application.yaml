server:
  port: 8081
  shutdown: graceful
  tomcat:
    connection-timeout: 2s

info:
  system: HabitQuest
marketplace:
  service-uri: ${MARKETPLACE_SERVICE_URI:http://localhost:8083}

spring:
  application:
    name: avatar-service
  lifecycle:
    timeout-per-shutdown-phase: 15s

################## KAFKA ##################
  cloud:
    stream:
      bindings:
        avatar-level-upped-out-0:
          destination: avatar.level-upped
          content-type: application/json
        avatar-dead-out-0:
          destination: avatar.dead
          content-type: application/json
        avatar-skill-point-out-0:
          destination: avatar.skill-point-assigned
          content-type: application/json
        avatar-new-spell-out-0:
          destination: avatar.new-spell-learned
          content-type: application/json
      kafka:
        binder:
          brokers: ${KAFKA_BROKER:localhost:9092}
          auto-create-topics: true
          producer-properties:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer
            acks: all
            retries: 3
            enable.idempotence: true

################## RESILIENCY ##################
resilience4j:
  # RETRY
  retry:
    instances:
      marketplaceClient:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
        ignore-exceptions:
          - habitquest.avatar.infrastructure.MarketplaceCommunicationException

  # CIRCUIT BREAKER
  circuit-breaker:
    instances:
      marketplaceClient:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException

############ OBSERVABILITY #############
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, circuitbreakers, retries, bindings, configprops, env, functions, health, heapdump, info, loggers, mappings, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        resilience4j.circuitbreaker: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

  health:
    circuitbreakers:
      enabled: true