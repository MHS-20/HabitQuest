server:
  port: 9000
  shutdown: graceful

info:
  system: habitquest
services:
  avatar:
    base-url: ${AVATAR_SERVICE_URI:http://localhost:8081}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-production-min-32-chars}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}

spring:
  application:
    name: edge-service
  lifecycle:
    timeout-per-shutdown-phase: 15s

################## KAFKA ##################
  cloud:
    stream:
      bindings:
        userRegistered-out-0:
          destination: user.registered
      kafka:
        binder:
          brokers: ${KAFKA_BROKER:localhost:9092}

################## GATEWAY ##################
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

          routes:
            - id: avatar-service
              uri: ${AVATAR_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/v1/avatars/**
            - id: guild-service
              uri: ${GUILD_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/guilds/**
            - id: battle-service
              uri: ${GUILD_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/battles/**
            - id: marketplace-service
              uri: ${MARKETPLACE_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/api/v1/battles/**
            - id: quest-service
              uri: ${QUEST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/v1/quests/**
            - id: tracking-service
              uri: ${TRACKING_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/api/v1/habits/**


################## RESILIENCY ##################
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 20
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15000
    instances:
      avatarCircuitBreaker:
        baseConfig: default
      guildCircuitBreaker:
        baseConfig: default
      questCircuitBreaker:
        baseConfig: default
      habitCircuitBreaker:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

  ratelimiter:
    instances:
      default:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 50ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2


############ OBSERVABILITY #############
logging:
  group:
    circuitbreaker: io.github.resilience4j, org.springframework.cloud.circuitbreaker
  level:
    circuitbreaker: info
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, circuitbreakers, retries, bindings, configprops, env, functions, health, heapdump, info, loggers, mappings, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
  otlp:
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318}/v1/metrics
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318}/v1/traces

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        resilience4j.circuitbreaker: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

  health:
    circuitbreakers:
      enabled: true