server:
  port: 9000
  shutdown: graceful
  tomcat:
    connection-timeout: 2s

services:
  avatar:
    base-url: http://avatar-service:8081

spring:
  application:
    name: edge-service
  lifecycle:
    timeout-per-shutdown-phase: 15s
  config:
    import: ""
  cloud:
    stream:
      bindings:
        userRegistered-out-0:
          destination: user.registered
      kafka:
        binder:
          brokers: localhost:9092
    config:
      enabled: false
      uri: http://localhost:8888
      request-connect-timeout: 5000
      request-read-timeout: 5000
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
    gateway:
      server:
        webmvc:
          routes:
          - id: avatar-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/v1/avatars/**

          - id: guild-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/v1/guilds/**

          - id: battle-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/v1/battles/**

          - id: quest-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/quests/**

          - id: tracking-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/v1/habits/**

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-production-min-32-chars}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 20
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15000
    instances:
      avatarCircuitBreaker:
        baseConfig: default
      guildCircuitBreaker:
        baseConfig: default
      questCircuitBreaker:
        baseConfig: default
      habitCircuitBreaker:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

  ratelimiter:
    instances:
      default:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 50ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

logging:
  group:
    circuitbreaker: io.github.resilience4j, org.springframework.cloud.circuitbreaker
  level:
    circuitbreaker: info
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"

info:
  system: habitquest

management:
  endpoints:
    web:
      exposure:
        include: configprops, env, gateway, health, heapdump, info, loggers, mappings, prometheus
  endpoint:
    health:
      show-details:
      show-components: always
      probes:
        enabled: true

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}