spring:
  cloud:
    stream:
      bindings:
        userRegistered-out-0:
          destination: user.registered
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
    gateway:
      mvc:
        routes:
          - id: avatar-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/v1/avatars/**

          - id: guild-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/v1/guilds/**

          - id: battle-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/v1/battles/**

          - id: quest-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/quests/**

          - id: tracking-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/v1/habits/**


app:
  jwt:
    secret: test-secret-key-minimum-32-chars!!
    expiration-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
        probes:
          enabled: true