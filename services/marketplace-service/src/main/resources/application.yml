server:
  port: 8083
  shutdown: graceful
  netty:
    connection-timeout: 2s
    idle-timeout: 15s

spring:
  application:
    name: marketplace-service
  lifecycle:
    timeout-per-shutdown-phase: 15s
  config:
    import: ""

info:
  system: HabitQuest
avatar:
  service-uri: "http://localhost:8081"

  cloud:
    config:
      enabled: false
      uri: http://localhost:8888
      request-connect-timeout: 5000
      request-read-timeout: 5000
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
    stream:
      bindings:
        marketplace-item-bought-out-0:
          destination: marketplace.item-bought
          content-type: application/json
        marketplace-item-sold-out-0:
          destination: marketplace.item-sold
          content-type: application/json
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true
          producer-properties:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.StringSerializer
            acks: all
            retries: 3
            enable.idempotence: true

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"

resilience4j:
  # RETRY
  retry:
    instances:
      avatarClient:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
        ignore-exceptions:
          - habitquest.avatar.infrastructure.MarketplaceCommunicationException

  # CIRCUIT BREAKER
  circuit-breaker:
    instances:
      avatarClient:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, circuitbreakers, retries, bindings, configprops, env, functions, health, heapdump, info, loggers, mappings, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    circuitbreakers:
      enabled: true

