server:
  port: 8082
  shutdown: graceful
  netty:
    connection-timeout: 2s
    idle-timeout: 15s

info:
  system: HabitQuest
avatar:
  service-uri: ${AVATAR_SERVICE_URI:http://localhost:8081}

spring:
  application:
    name: guild-service
  lifecycle:
    timeout-per-shutdown-phase: 15s


################## KAFKA ##################
  cloud:
    stream:
      bindings:
        guild-created-out-0:
          destination: guild.created
          content-type: application/json
        guild-deleted-out-0:
          destination: guild.deleted
          content-type: application/json
        guild-joined-out-0:
          destination: guild.joined
          content-type: application/json
        guild-left-out-0:
          destination: guild.left
          content-type: application/json
        guild-removed-out-0:
          destination: guild.member-removed
          content-type: application/json
        guild-role-assigned-out-0:
          destination: guild.role-assigned
          content-type: application/json
        guild-battle-started-out-0:
          destination: guild.battle-started
          content-type: application/json
        guild-battle-won-out-0:
          destination: guild.battle-won
          content-type: application/json
        guild-battle-lost-out-0:
          destination: guild.battle-lost
          content-type: application/json
      kafka:
        binder:
          brokers: ${KAFKA_BROKER:localhost:9092}
          auto-create-topics: true
          producer-properties:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.apache.kafka.common.serialization.StringSerializer
            acks: all
            retries: 3
            enable.idempotence: true

################## RESILIENCY ##################
resilience4j:
  # RETRY
  retry:
    instances:
      avatarClient:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
        ignore-exceptions:
          - habitquest.avatar.infrastructure.AvatarCommunicationException

  # CIRCUIT BREAKER
  circuit-breaker:
    instances:
      avatarClient:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException


############ OBSERVABILITY #############
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, circuitbreakers, retries, bindings, configprops, env, functions, health, heapdump, info, loggers, mappings, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        resilience4j.circuitbreaker: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

  health:
    circuitbreakers:
      enabled: true