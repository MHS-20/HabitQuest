replicaCount: 1

tempo:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"

service:
  type: ClusterIP
  port: 3200

persistence:
  enabled: true
  size: 1Gi

config: |
  server:
    http_listen_port: 3200
    grpc_listen_port: 9095

  distributor:
    receivers:
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"
          grpc:
              endpoint: "0.0.0.0:4317"

  storage:
    trace:
      backend: local
      local:
        path: /tmp/tempo/blocks

  usage_report:
    reporting_enabled: false