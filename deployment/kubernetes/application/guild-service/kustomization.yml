apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- github.com/MHS-20/habitquest/guild-service/k8s?ref=main

patches:
- path: patch-env.yml
- path: patch-resources.yml
- path: patch-volumes.yml

configMapGenerator:
- behavior: merge
  files:
  - application.yml
  name: guild-config

images:
- name: guild-service
  newName: ghcr.io/ghcr.io/mhs-20/habitquest/guild-service/guild-service
  newTag: guild-v1.1.0

replicas:
- count: 2
  name: guild-service
