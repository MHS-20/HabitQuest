apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  template:
    spec:
      containers:
        - name: notification-service
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod

            - name: MAIL_HOST
              value: smtp.gmail.com
            - name: MAIL_PORT
              value: "587"
            - name: MAIL_USERNAME
              value: "tua-email@gmail.com"
            - name: MAIL_PASSWORD
              value: "tua-app-password"

            - name: KAFKA_BROKER
              value: kafka-service:9092
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318