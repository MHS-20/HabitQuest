apiVersion: apps/v1
kind: Deployment
metadata:
  name: avatar-service
spec:
  template:
    spec:
      containers:
        - name: avatar-service
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: MARKETPLACE_SERVICE_URI
              value: http://marketplace-service:8083
            - name: KAFKA_BROKER
              value: kafka-service:9092
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://tempo.prometheus-system.svc.cluster.local:4318
